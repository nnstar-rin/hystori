<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-purple-600 to-blue-600 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i data-lucide="user-plus" class="w-8 h-8 text-white"></i>
            </div>
        </div>

        <!-- Register Card -->
        <div class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-2xl p-8 space-y-6 transition-all duration-500 hover:shadow-xl">

            <div class="text-center">
                <h2 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                    Create Account
                </h2>
                <p class="text-gray-500 mt-2">Sign up to get started</p>
            </div>

            <form class="space-y-5">

                <!-- Name -->
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="name">
                        Full Name
                    </label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input 
                            type="text"
                            id="name"
                            placeholder="Enter your name"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white/50"
                            required
                        >
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="email">
                        Email Address
                    </label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input 
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white/50"
                            required
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="password">
                        Password
                    </label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input 
                            type="password"
                            id="password"
                            placeholder="Create password"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white/50"
                            required
                        >
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="confirm">
                        Confirm Password
                    </label>
                    <div class="relative">
                        <i data-lucide="shield-check" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input 
                            type="password"
                            id="confirm"
                            placeholder="Confirm password"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white/50"
                            required
                        >
                    </div>
                </div>

                <!-- Button -->
                <button 
                    type="submit"
                    class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-xl hover:opacity-90 transition duration-200 transform hover:-translate-y-0.5 shadow-lg hover:shadow-xl"
                >
                    Sign Up
                </button>

            </form>

            <!-- Login Link -->
            <p class="text-center text-sm text-gray-600">
                Already have an account?
                <a href="index.html" class="text-purple-600 hover:text-purple-800 font-semibold transition-colors duration-200">
                    Sign in
                </a>
            </p>

        </div>
    </div>
    <p id="message"></p>
    <script>scr="js/register.js" defer</script>
    <script>
    lucide.createIcons();
    </script>

</body>
</html>
